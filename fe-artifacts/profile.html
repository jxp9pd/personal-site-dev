<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Profile</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --ink:#e8eaed; --muted:#9aa0aa;
    --line:#262b34; --accent:#4f9cf9; --good:#37b86b; --bad:#e0564a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header{padding:12px 20px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:17px;margin:0;font-weight:650;letter-spacing:.2px}
  header a.home{color:var(--muted);text-decoration:none;font-size:13px;font-weight:550}
  header a.home:hover{color:var(--ink)}
  .spacer{flex:1}
  main{max-width:820px;margin:0 auto;padding:24px 20px 60px}

  .msg{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:28px 24px;text-align:center;color:var(--muted)}
  .msg h2{margin:0 0 8px;color:var(--ink);font-size:18px;font-weight:650}
  .msg p{margin:0 0 16px}
  .btn{display:inline-block;background:var(--accent);border:1px solid var(--accent);
    color:#fff;padding:9px 16px;border-radius:8px;cursor:pointer;text-decoration:none;
    font:600 14px/1 inherit}
  .btn:hover{filter:brightness(1.06)}
  .link{color:var(--accent);text-decoration:none}
  .link:hover{text-decoration:underline}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:18px 20px;margin-bottom:18px}
  .card-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .card-head .game{font-size:17px;font-weight:650}
  .card-head .mode{font-size:12px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.6px;background:var(--bg);border:1px solid var(--line);
    padding:3px 8px;border-radius:999px}
  .card-head .head-right{margin-left:auto;display:flex;align-items:center}
  .cat-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;
    font-weight:650;margin:26px 0 12px}
  .mode-toggle{display:inline-flex;gap:2px;background:var(--bg);border:1px solid var(--line);
    border-radius:999px;padding:2px}
  .mode-btn{background:none;border:none;color:var(--muted);cursor:pointer;
    font:600 12px/1 inherit;padding:6px 11px;border-radius:999px;letter-spacing:.3px}
  .mode-btn.on{background:var(--panel);color:var(--ink)}

  .highlights{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .hl{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .hl .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .hl .score{font-size:22px;font-weight:700;margin-top:4px}
  .hl .score.best{color:var(--good)}
  .hl .date{font-size:12px;color:var(--muted);margin-top:2px}

  .log-table{width:100%;border-collapse:collapse;font-size:14px}
  .log-table th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.6px;font-weight:600;padding:0 10px 8px}
  .log-table td{padding:9px 10px;border-top:1px solid var(--line)}
  .log-table .lscore{font-variant-numeric:tabular-nums;font-weight:600}
  .log-table .lmode{color:var(--muted)}
  .log-table .ldate{color:var(--muted);white-space:nowrap}
  .log-nav{display:flex;align-items:center;gap:14px;margin-top:14px}
  .log-page{font-size:13px;color:var(--muted)}
  .btn-sm{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:6px 12px;border-radius:8px;cursor:pointer;font:600 13px/1 inherit}
  .btn-sm:hover:not(:disabled){border-color:var(--accent)}
  .btn-sm:disabled{color:var(--muted);cursor:default;opacity:.6}

  .person{display:flex;gap:16px;align-items:center;margin-bottom:20px}
  .avatar{width:64px;height:64px;border-radius:50%;flex:0 0 auto;object-fit:cover;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;font-weight:700;color:#fff;letter-spacing:.5px}
  .person .who{min-width:0}
  .person .uname{font-size:20px;font-weight:700;line-height:1.2}
  .person .meta{font-size:13px;color:var(--muted);margin-top:3px}
  .bio-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-bottom:22px}
  .bio-text{white-space:pre-wrap;word-break:break-word}
  .bio-empty{color:var(--muted);font-style:italic}
  .bio-row{display:flex;gap:10px;align-items:center;margin-top:10px}
  .bio-ta{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;
    color:var(--ink);padding:9px 11px;font:inherit;resize:vertical;min-height:64px}
  .linkbtn{background:none;border:none;color:var(--accent);cursor:pointer;font:inherit;padding:0}
  .linkbtn:hover{text-decoration:underline}
  .linkbtn:disabled{color:var(--muted);cursor:default;text-decoration:none}
  .bio-note{font-size:12px;color:var(--muted);margin-left:auto}
  .bio-note.err{color:var(--bad)}
</style>
</head>
<body>
<header>
  <a class="home" href="/">&larr; Home</a>
  <h1>Your Profile</h1>
  <div class="spacer"></div>
  <div id="profileMount"></div>
</header>
<main id="content"></main>

<script type="module">
import { Profiles } from "./assets/js/profiles.js";
import { getSession, fetchPlays, fetchProfileByUsername, updateProfile, onAuthStateChange }
  from "./assets/js/dataClient.js";
import { computeStats } from "./assets/js/stats.js";
import { getGame, getModeLabel, categoryOf, gamesByCategory } from "./assets/js/manifest.js";
import { initialsAvatar } from "./assets/js/avatar.js";
import { paginate } from "./assets/js/pagination.js";
import { resolveHomeHref } from "./assets/js/nav.js";

const BIO_MAX = 200;
const LOG_PAGE_SIZE = 10;

const content = document.getElementById("content");

// "← Home" returns to the page that opened the profile (passed via ?from=),
// falling back to the site root. resolveHomeHref rejects off-origin values.
const homeLink = document.querySelector("header a.home");
if (homeLink) homeLink.href = resolveHomeHref(location.search);

// Header button + shared login modal + logged-out auto-prompt come from the
// facade; this page only owns the profile body below the header.
Profiles.init({ headerMount: document.getElementById("profileMount") })
  .catch(err => console.error("Profiles init failed", err));

function esc(value) {
  return String(value)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function fmtDateTime(iso) {
  const d = new Date(iso);
  return Number.isNaN(d.getTime()) ? "" : d.toLocaleString();
}

function fmtDate(iso) {
  const d = new Date(iso);
  return Number.isNaN(d.getTime()) ? "" : d.toLocaleDateString();
}

function gameName(gameId) {
  return getGame(gameId)?.name ?? gameId;
}

function modeLabel(gameId, mode) {
  return getModeLabel(gameId, mode) ?? mode;
}

function scoreText(play) {
  return `${play.score}/${play.total}`;
}

function messageHtml({ title, body, actionHtml = "" }) {
  return `
    <div class="msg">
      <h2>${esc(title)}</h2>
      <p>${body}</p>
      ${actionHtml}
    </div>`;
}

function renderLoggedOut() {
  content.innerHTML = messageHtml({
    title: "Log in to see your profile",
    body: "Your best scores and full play history live here once you're signed in.",
    actionHtml: `<button class="btn" id="loginBtn" type="button">Log in</button>`,
  });
  document.getElementById("loginBtn")?.addEventListener("click", () => Profiles.promptLogin());
}

function emptyHtml() {
  return messageHtml({
    title: "No games recorded yet",
    body: `Go play a round and it'll show up here. <a class="link" href="/games">Browse games &rarr;</a>`,
  });
}

function renderError() {
  content.innerHTML = messageHtml({
    title: "Couldn't load your profile",
    body: "Something went wrong fetching your play history. Please refresh and try again.",
  });
}

function percent(ratio) {
  return Number.isFinite(ratio) ? `${Math.round(ratio * 100)}%` : "—";
}

function ratioOf(play) {
  return play.total > 0 ? play.score / play.total : NaN;
}

// stats is a flat list of per-(gameId, mode) summaries; collapse it to
// gameId -> Map(mode -> summary) so each game renders as one card.
function groupByGame(stats) {
  const byGame = new Map();
  for (const g of stats) {
    if (!byGame.has(g.gameId)) byGame.set(g.gameId, new Map());
    byGame.get(g.gameId).set(g.mode, g);
  }
  return byGame;
}

// Modes with plays, ordered by the manifest's declared mode order when the game
// is known, else by insertion order.
function orderedModes(gameId, modesMap) {
  const game = getGame(gameId);
  if (game?.modes) return Object.keys(game.modes).filter((m) => modesMap.has(m));
  return [...modesMap.keys()];
}

// Selected mode per game, kept across toggle clicks (reset each full render).
const selectedModes = new Map();

function statHtml(group) {
  return `
    <div class="highlights">
      <div class="hl"><div class="label">Attempts</div><div class="score">${group.count}</div></div>
      <div class="hl"><div class="label">Best</div><div class="score best">${percent(ratioOf(group.best))}</div></div>
      <div class="hl"><div class="label">Average</div><div class="score">${percent(group.average)}</div></div>
    </div>`;
}

function gameCardHtml(gameId, modesMap) {
  const modes = orderedModes(gameId, modesMap);
  if (!selectedModes.has(gameId)) {
    selectedModes.set(gameId, modes.includes("find") ? "find" : modes[0]);
  }
  const selected = selectedModes.get(gameId);

  const headRight = modes.length > 1
    ? `<div class="mode-toggle" role="tablist">${modes.map((m) =>
        `<button class="mode-btn${m === selected ? " on" : ""}" type="button"
           role="tab" aria-selected="${m === selected}"
           data-game="${esc(gameId)}" data-mode="${esc(m)}">${esc(modeLabel(gameId, m))}</button>`).join("")}</div>`
    : `<span class="mode">${esc(modeLabel(gameId, selected))}</span>`;

  return `
    <section class="card" data-game="${esc(gameId)}">
      <div class="card-head">
        <span class="game">${esc(gameName(gameId))}</span>
        <div class="head-right">${headRight}</div>
      </div>
      <div class="stat-region">${statHtml(modesMap.get(selected))}</div>
    </section>`;
}

function categorySectionHtml(category, cardsHtml) {
  return `<h2 class="cat-title">${esc(category)}</h2>${cardsHtml}`;
}

// Renders category sections in manifest order, one card per played game, then a
// trailing "Other" section for played games whose slug the manifest doesn't know.
function categoriesHtml(byGame) {
  const rendered = new Set();
  const sections = [];

  for (const { category, games } of gamesByCategory()) {
    const cards = games
      .filter((g) => byGame.has(g.slug))
      .map((g) => { rendered.add(g.slug); return gameCardHtml(g.slug, byGame.get(g.slug)); });
    if (cards.length) sections.push(categorySectionHtml(category, cards.join("")));
  }

  const orphanCards = [...byGame.entries()]
    .filter(([gameId]) => !rendered.has(gameId))
    .map(([gameId, modesMap]) => gameCardHtml(gameId, modesMap));
  if (orphanCards.length) {
    sections.push(categorySectionHtml("Other", orphanCards.join("")));
  }

  return sections.join("");
}

function wireModeToggles() {
  content.querySelectorAll(".mode-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const { game: gameId, mode } = btn.dataset;
      selectedModes.set(gameId, mode);
      const card = content.querySelector(`.card[data-game="${gameId}"]`);
      if (!card) return;
      card.querySelector(".stat-region").innerHTML =
        statHtml(selfCtx.byGame.get(gameId).get(mode));
      card.querySelectorAll(".mode-btn").forEach((b) => {
        const on = b.dataset.mode === mode;
        b.classList.toggle("on", on);
        b.setAttribute("aria-selected", String(on));
      });
    });
  });
}

// Global newest-first ordering across all games/modes, matching stats.js recency
// (created_at desc, then id desc as a deterministic tiebreak).
function sortNewestFirst(plays) {
  return plays.slice().sort((a, b) => {
    if (a.created_at !== b.created_at) return a.created_at < b.created_at ? 1 : -1;
    return String(a.id) < String(b.id) ? 1 : -1;
  });
}

// Current 1-based page of the activity log; clamped by paginate() on render.
let logPage = 1;

function logRowHtml(play) {
  return `
    <tr>
      <td>${esc(gameName(play.game_id))}</td>
      <td class="lmode">${esc(modeLabel(play.game_id, play.mode))}</td>
      <td class="lscore">${esc(scoreText(play))}</td>
      <td class="ldate">${esc(fmtDateTime(play.created_at))}</td>
    </tr>`;
}

function logHtml() {
  const { pageItems, page, pageCount } = paginate(selfCtx.logPlays, logPage, LOG_PAGE_SIZE);
  logPage = page;
  const rows = pageItems.map(logRowHtml).join("");
  const nav = pageCount > 1 ? `
    <div class="log-nav">
      <button class="btn-sm" id="logPrev" type="button" ${page <= 1 ? "disabled" : ""}>&larr; Prev</button>
      <span class="log-page">Page ${page} of ${pageCount}</span>
      <button class="btn-sm" id="logNext" type="button" ${page >= pageCount ? "disabled" : ""}>Next &rarr;</button>
    </div>` : "";
  return `
    <h2 class="cat-title">Activity</h2>
    <table class="log-table">
      <thead><tr><th>Game</th><th>Mode</th><th>Score</th><th>Date</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${nav}`;
}

function wireLogNav() {
  const rerender = () => {
    const wrap = document.getElementById("activityLog");
    if (!wrap) return;
    wrap.innerHTML = logHtml();
    wireLogNav();
  };
  document.getElementById("logPrev")?.addEventListener("click", () => { logPage -= 1; rerender(); });
  document.getElementById("logNext")?.addEventListener("click", () => { logPage += 1; rerender(); });
}

// avatar_url is a dormant seam (always null in v1): when present it would win,
// otherwise fall back to the deterministic generated initials avatar.
function avatarHtml(profile) {
  if (profile.avatar_url) {
    return `<img class="avatar" src="${esc(profile.avatar_url)}" alt="">`;
  }
  const { initials, color } = initialsAvatar(profile.username || profile.user_id);
  return `<div class="avatar" style="background:${esc(color)}">${esc(initials)}</div>`;
}

function personCardHtml(profile, session) {
  const joined = fmtDate(profile.created_at);
  const email = session.user.email;
  const metaParts = [];
  if (email) metaParts.push(esc(email));
  if (joined) metaParts.push(`Joined ${esc(joined)}`);
  return `
    <section class="person">
      ${avatarHtml(profile)}
      <div class="who">
        <div class="uname">${esc(profile.username)}</div>
        <div class="meta">${metaParts.join(" · ")}</div>
      </div>
    </section>`;
}

function bioViewHtml(bio) {
  const text = (bio ?? "").trim();
  const body = text
    ? `<div class="bio-text">${esc(text)}</div>`
    : `<div class="bio-empty">No bio yet.</div>`;
  return `${body}
    <div class="bio-row">
      <button class="linkbtn" id="bioEdit" type="button">${text ? "Edit bio" : "Add a bio"}</button>
    </div>`;
}

function bioEditHtml(bio) {
  const text = (bio ?? "").trim();
  return `
    <textarea class="bio-ta" id="bioTa" maxlength="${BIO_MAX}" rows="3">${esc(text)}</textarea>
    <div class="bio-row">
      <button class="btn" id="bioSave" type="button">Save</button>
      <button class="linkbtn" id="bioCancel" type="button">Cancel</button>
      <span class="bio-note" id="bioNote"></span>
    </div>`;
}

// Self-mode render context, kept so a bio save can re-render without re-fetching.
let selfCtx = null;

function renderSelf() {
  const { session, profile, stats } = selfCtx;
  selectedModes.clear();
  logPage = 1;
  selfCtx.byGame = groupByGame(stats);
  const bodyHtml = stats.length === 0
    ? emptyHtml()
    : `${categoriesHtml(selfCtx.byGame)}<div id="activityLog">${logHtml()}</div>`;
  content.innerHTML = `
    ${personCardHtml(profile, session)}
    <div class="bio-block" id="bioBlock">${bioViewHtml(profile.bio)}</div>
    ${bodyHtml}`;
  wireBioView();
  wireModeToggles();
  wireLogNav();
}

function wireBioView() {
  document.getElementById("bioEdit")?.addEventListener("click", () => {
    document.getElementById("bioBlock").innerHTML = bioEditHtml(selfCtx.profile.bio);
    wireBioEdit();
  });
}

function wireBioEdit() {
  const ta = document.getElementById("bioTa");
  const note = document.getElementById("bioNote");
  const saveBtn = document.getElementById("bioSave");
  const cancelBtn = document.getElementById("bioCancel");

  const showCount = () => {
    note.classList.remove("err");
    note.textContent = `${ta.value.length}/${BIO_MAX}`;
  };
  showCount();
  ta.addEventListener("input", showCount);
  ta.focus();

  cancelBtn.addEventListener("click", () => {
    document.getElementById("bioBlock").innerHTML = bioViewHtml(selfCtx.profile.bio);
    wireBioView();
  });

  saveBtn.addEventListener("click", async () => {
    const next = ta.value.trim().slice(0, BIO_MAX);
    saveBtn.disabled = true;
    cancelBtn.disabled = true;
    try {
      const updated = await updateProfile({ bio: next });
      selfCtx.profile.bio = updated?.bio ?? next;
    } catch (err) {
      console.error("updateProfile failed", err);
      saveBtn.disabled = false;
      cancelBtn.disabled = false;
      note.classList.add("err");
      note.textContent = "Couldn't save — try again.";
      return;
    }
    document.getElementById("bioBlock").innerHTML = bioViewHtml(selfCtx.profile.bio);
    wireBioView();
  });
}

// Guards against out-of-order async renders when auth events and the initial
// load race: only the newest invocation is allowed to paint.
let renderSeq = 0;

async function refresh(sessionArg) {
  const seq = ++renderSeq;

  let session = sessionArg;
  if (session === undefined) {
    try {
      session = await getSession();
    } catch {
      session = null;
    }
    if (seq !== renderSeq) return;
  }

  if (!session) {
    renderLoggedOut();
    return;
  }

  // A brand-new signup's profile row can briefly lag; fall back to session-
  // derived identity so the page still renders rather than erroring.
  const uname = session.user.user_metadata?.username;
  let profile;
  let plays;
  try {
    [profile, plays] = await Promise.all([
      uname ? fetchProfileByUsername(uname) : Promise.resolve(null),
      fetchPlays(session.user.id),
    ]);
  } catch (err) {
    if (seq !== renderSeq) return;
    console.error("profile load failed", err);
    renderError();
    return;
  }
  if (seq !== renderSeq) return;

  selfCtx = {
    session,
    profile: profile ?? fallbackProfile(session),
    stats: computeStats(plays),
    logPlays: sortNewestFirst(plays),
  };
  renderSelf();
}

function fallbackProfile(session) {
  return {
    user_id: session.user.id,
    username: sessionUsername(session),
    bio: null,
    created_at: session.user.created_at,
    avatar_url: null,
  };
}

function sessionUsername(session) {
  return session.user.user_metadata?.username || session.user.email || "You";
}

onAuthStateChange((_event, session) => refresh(session ?? null));

refresh();
</script>
</body>
</html>
