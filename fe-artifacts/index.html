<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Penta Projects</title>
  <meta name="description" content="Penta Projects — a small workshop of experiments, games, and tools." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/site.css" />
</head>
<body>
  <div class="grid-bg"></div>
  <main class="wrap">
    <svg class="penta reveal d1" viewBox="0 0 120 120" role="img" aria-label="Penta Projects logo">
      <defs>
        <linearGradient id="pentaGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#00e5c0" />
          <stop offset="0.55" stop-color="#22b8ff" />
          <stop offset="1" stop-color="#3b82f6" />
        </linearGradient>
      </defs>
      <g class="ring ring-outer"><polygon points="60,14 103.7,45.8 87,97.2 33,97.2 16.3,45.8" /></g>
      <g class="ring ring-mid"><polygon points="60,14 103.7,45.8 87,97.2 33,97.2 16.3,45.8" /></g>
      <g class="ring ring-inner"><polygon points="60,14 103.7,45.8 87,97.2 33,97.2 16.3,45.8" /></g>
      <circle class="core" cx="60" cy="60" r="5" />
    </svg>

    <h1 class="wordmark reveal d2">Penta <span class="gradient-text">Projects</span></h1>
    <p class="tagline reveal d3">A small workshop of half-serious experiments — games worth a coffee break and tools worth keeping.</p>

    <nav class="actions reveal d4">
      <a class="btn primary" href="/games">Games <span class="arrow">&rarr;</span></a>
      <a class="btn" href="/tools">Tools <span class="arrow">&rarr;</span></a>
    </nav>

    <footer class="foot reveal d4">Built by John Pentakalos</footer>
  </main>
</body>
</html>
