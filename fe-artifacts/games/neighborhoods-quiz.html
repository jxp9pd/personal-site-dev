<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Neighborhoods Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    /* Homepage "paper" palette (see /assets/site.css). Semantic map tokens keep
       their names because neighborhoods-quiz.js reads them at runtime. */
    --paper:#fdfcf3; --paper-2:#f7f5ea;
    --bg:#fdfcf3; --panel:#fdfcf3; --ink:#14130f; --muted:#6b675e;
    --line:rgba(20,19,15,.14);
    --g1:#00e5c0; --g2:#22b8ff; --g3:#3b82f6;
    --brand:linear-gradient(100deg,var(--g1),var(--g2) 55%,var(--g3));
    --font-display:"Instrument Serif","Iowan Old Style",Georgia,serif;
    --font-mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    /* map polygon colors, tuned to read on a light basemap */
    --accent:#22b8ff; --good:#0f9d58; --bad:#d64541; --warn:#c98a1e;
    --idle:#6b675e; --idle-line:rgba(20,19,15,.3);
    --accent-fill:#22b8ff; --good-fill:#0f9d58; --bad-fill:#d64541; --warn-fill:#c98a1e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:var(--font-mono);font-size:15px;line-height:1.45;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  /* dvh with vh fallback: mobile browser chrome makes 100vh overflow behind the
     address bar, clipping the map bottom; dvh tracks the visible viewport. */
  #app{display:none;flex-direction:column;height:100vh;height:100dvh}
  header{padding:12px clamp(16px,3vw,24px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:var(--paper)}
  header h1{font-family:var(--font-display);font-size:22px;margin:0;font-weight:400;
    letter-spacing:.01em;line-height:1.2}
  .back{color:var(--muted);text-decoration:none;font-size:11px;font-weight:500;
    text-transform:uppercase;letter-spacing:.14em}
  .back:hover{color:var(--ink)}
  .mode-tabs{display:flex;gap:4px;background:var(--paper-2);border:1px solid var(--line);
    border-radius:999px;padding:4px}
  .mode-tabs button{background:none;border:0;color:var(--muted);padding:6px 14px;
    border-radius:999px;cursor:pointer;font-family:var(--font-mono);font-size:11px;
    font-weight:500;text-transform:uppercase;letter-spacing:.12em;
    transition:color .2s,background .2s}
  .mode-tabs button:hover{color:var(--ink)}
  .mode-tabs button.active{background:var(--brand);color:#fff}
  .spacer{flex:1}
  .stat{font-size:12px;color:var(--muted);letter-spacing:.02em}
  .stat b{color:var(--ink)}
  .btn{display:inline-flex;align-items:center;gap:8px;background:transparent;
    border:1px solid var(--ink);color:var(--ink);padding:8px 16px;border-radius:999px;
    cursor:pointer;font-family:var(--font-mono);font-size:11px;font-weight:500;
    text-transform:uppercase;letter-spacing:.14em;text-decoration:none;
    transition:color .25s,background .25s,box-shadow .25s}
  .btn:hover{color:var(--paper);background:var(--ink);
    box-shadow:0 12px 30px -14px rgba(20,19,15,.55)}
  .btn[aria-current="page"]{color:var(--paper);background:var(--brand);border-color:transparent}
  .btn[aria-current="page"]:hover{background:var(--brand);box-shadow:0 14px 34px -14px rgba(34,184,255,.6)}
  /* In-game "Leaderboard" trigger: brand-gradient pill, shown only to logged-in
     players in a scored mode (toggled from neighborhoods-quiz.js). */
  .btn.lb{color:var(--paper);background:var(--brand);border-color:transparent}
  .btn.lb:hover{background:var(--brand);box-shadow:0 14px 34px -14px rgba(34,184,255,.6)}
  .btn.lb[hidden]{display:none}
  .gradient-text{background:var(--brand);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent}

  /* Shared top bar — mirrors the homepage (/assets/site.css) so every portal
     opens with the same Penta Projects logo (left) + nav (right). */
  .site-head{display:flex;align-items:center;justify-content:space-between;gap:20px;
    padding:28px clamp(24px,5vw,64px)}
  .site-head .logo{font-family:var(--font-display);font-weight:400;font-size:1.75rem;
    letter-spacing:.01em;text-decoration:none;line-height:1.3;white-space:nowrap}
  .site-head .nav{display:flex;gap:14px;align-items:center}
  main{flex:1;position:relative}
  #map{position:absolute;inset:0;background:var(--paper-2)}
  .leaflet-container{background:var(--paper-2)}
  .prompt{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:500;
    background:var(--paper);border:1px solid var(--line);border-radius:14px;
    padding:12px 20px;min-width:260px;text-align:center;
    box-shadow:0 10px 30px -12px rgba(20,19,15,.35)}
  .prompt .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.16em}
  .prompt .target{font-family:var(--font-display);font-size:26px;font-weight:400;
    margin-top:2px;line-height:1.1}
  .prompt .fb{font-size:13px;margin-top:4px;min-height:17px}
  .fb.good{color:var(--good)} .fb.bad{color:var(--bad)}

  /* NAME mode (timed type-to-recall). Pre-game panel reuses the .prompt card;
     the play input is a centered pill floating over the map. */
  .name-pregame .name-pregame-sub{font-size:12px;color:var(--muted);
    margin:8px 0 12px;line-height:1.4}
  .name-pregame[hidden]{display:none}
  .name-play{position:absolute;top:14px;left:50%;transform:translateX(-50%);
    z-index:500;width:min(340px,calc(100% - 24px))}
  .name-play[hidden]{display:none}
  #nameInput{width:100%;background:var(--paper);border:1px solid var(--line);
    border-radius:14px;padding:12px 18px;font-family:var(--font-mono);font-size:16px;
    color:var(--ink);text-align:center;
    box-shadow:0 10px 30px -12px rgba(20,19,15,.35);
    transition:border-color .15s,box-shadow .15s}
  #nameInput:focus{outline:none;border-color:var(--accent)}
  /* Miss cue on Enter: color only, no movement. */
  #nameInput.flash-bad{border-color:var(--bad);
    box-shadow:0 0 0 2px var(--bad),0 10px 30px -12px rgba(20,19,15,.35)}
  #nameGiveUp{margin-top:8px;width:100%;justify-content:center}
  /* Low-time countdown turns red at ≤60s (color only, no pulse). */
  #stat .time.low{color:var(--bad);font-weight:500}
  .leaflet-interactive{transition:fill .25s,fill-opacity .25s}
  .answer-tip{background:var(--paper);border:1px solid var(--line);color:var(--ink);
    font-family:var(--font-mono);font-size:12px;padding:2px 7px;border-radius:6px;
    box-shadow:0 4px 14px -8px rgba(20,19,15,.4)}
  .answer-tip::before{display:none}

  /* City selection screen */
  #select{display:none;min-height:100vh;min-height:100dvh;flex-direction:column;
    background-image:
      radial-gradient(120% 90% at 50% -10%, rgba(34,184,255,.06), transparent 60%),
      radial-gradient(80% 60% at 85% 110%, rgba(0,229,192,.05), transparent 55%)}
  .select-body{flex:1;width:100%;max-width:860px;margin:0 auto;
    padding:4vh clamp(24px,5vw,64px) 64px}
  #select .select-head{margin:0 0 32px}
  #select h1{font-family:var(--font-display);font-size:clamp(2.4rem,6vw,3.2rem);
    margin:0 0 4px;font-weight:400;line-height:1}
  .city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .city-card{position:relative;display:flex;align-items:center;justify-content:center;
    min-height:130px;background:var(--paper-2);overflow:hidden;
    border:1px solid var(--line);border-radius:16px;padding:18px;
    text-decoration:none;color:var(--ink)}
  /* Translucent landmark art fills the card; currentColor lets it inherit the ink tint. */
  .city-card .art{position:absolute;inset:0;color:var(--ink);opacity:.12;
    pointer-events:none;display:block}
  .city-card .art svg{width:100%;height:100%;display:block}
  .city-card .name{position:relative;font-family:var(--font-display);font-size:24px;
    font-weight:400;text-align:center;letter-spacing:.01em;transition:color .2s}
  .city-card:hover .name{color:var(--accent)}
  .select-msg{grid-column:1/-1;color:var(--muted);font-size:14px;margin:8px 2px}
  /* Restart shows its label by default; the compact icon is mobile-only. */
  #restart .restart-icon{display:none}

  /* ---- Mobile (single breakpoint). Desktop above is the default. ---- */
  @media (max-width:640px){
    /* Slim top bar: back · title · stat · restart · profile on one row. */
    header{gap:10px;flex-wrap:nowrap;padding:10px 14px}
    header h1{font-size:17px;flex:1;min-width:0;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .back{flex-shrink:0}
    .spacer{display:none}
    #profileMount{flex-shrink:0}
    .stat{flex-shrink:0;font-size:11px;white-space:nowrap}
    /* Stat collapses to "<correct>/<total> correct". */
    #stat .s-left,#stat .s-acc{display:none}
    /* Learn mode: no instruction text on mobile (tap is self-evident). */
    #app[data-mode="learn"] #stat{display:none}
    /* Restart becomes a compact circular icon button. */
    #restart{padding:8px;width:38px;height:38px;justify-content:center}
    #restart .restart-label{display:none}
    #restart .restart-icon{display:inline;font-size:16px}

    /* Mode tabs relocate to a fixed, thumb-zone bottom bar (CSS only). */
    #modeTabs{position:fixed;left:0;right:0;bottom:0;z-index:700;
      gap:0;border:0;border-top:1px solid var(--line);border-radius:0;
      background:var(--paper);padding:6px 8px;
      padding-bottom:calc(6px + env(safe-area-inset-bottom));
      justify-content:space-around;
      box-shadow:0 -6px 20px -12px rgba(20,19,15,.4)}
    #modeTabs button{flex:1;padding:12px 8px;border-radius:12px;font-size:11px}

    /* Prompt near full-width, pinned top; Name-it controls match its width. */
    .prompt{left:12px;right:12px;transform:none;min-width:0;width:auto;padding:10px 14px}
    .prompt .target{font-size:22px}
    .prompt .btn{padding:12px 10px;min-height:44px}
    .name-play{left:12px;right:12px;transform:none;width:auto}

    /* Selector polish: slimmer top bar, less padding, full-width heading. */
    .site-head{padding:16px 18px;gap:12px;flex-wrap:wrap}
    .select-body{padding:20px 18px 40px}
    #select .select-head{margin-bottom:20px}
    #select h1{font-size:2rem}
  }
</style>
</head>
<body>

<section id="select">
  <header class="site-head">
    <a class="logo gradient-text" href="/">Penta Projects</a>
    <nav class="nav">
      <a class="btn" href="/games" aria-current="page">Games</a>
      <a class="btn" href="/tools">Tools</a>
      <div id="selectProfileMount"></div>
    </nav>
  </header>
  <div class="select-body">
    <div class="select-head">
      <h1>Neighborhoods Quiz</h1>
    </div>
    <div class="city-grid" id="cityGrid"></div>
  </div>
</section>

<div id="app">
  <header>
    <a class="back" href="?">&larr; Home</a>
    <h1 id="title">Neighborhoods</h1>
    <div class="mode-tabs" id="modeTabs">
      <button data-mode="name" class="active">Name it</button>
      <button data-mode="find">Find it</button>
      <button data-mode="learn">Learn</button>
    </div>
    <div class="spacer"></div>
    <div class="stat" id="stat"></div>
    <button class="btn lb" id="leaderboardBtn" hidden>Leaderboard</button>
    <button class="btn" id="restart" aria-label="Restart"><span class="restart-label">Restart</span><span class="restart-icon" aria-hidden="true">↻</span></button>
    <div id="profileMount"></div>
  </header>
  <main>
    <div id="map"></div>
    <div class="prompt" id="prompt">
      <div class="label" id="pLabel">Find</div>
      <div class="target" id="pTarget">—</div>
      <div class="fb" id="pFb"></div>
    </div>
    <div class="prompt name-pregame" id="namePregame" hidden>
      <div class="label">Name it</div>
      <div class="target" id="namePregameCount">— neighborhoods</div>
      <p class="name-pregame-sub">Type as many as you can before the 10:00 clock runs out.</p>
      <button class="btn" id="nameStart">Start</button>
    </div>
    <div class="name-play" id="namePlay" hidden>
      <input type="text" id="nameInput" placeholder="Type a neighborhood…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <button class="btn" id="nameGiveUp">Give up</button>
    </div>
  </main>
</div>

<script type="module">
import { start } from "../assets/js/neighborhoods-quiz.js";
start().catch(err => console.error('Neighborhoods quiz failed to start', err));
</script>
</body>
</html>
