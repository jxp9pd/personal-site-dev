<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neighborhoods Quiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --ink:#e8eaed; --muted:#9aa0aa;
    --line:#262b34; --accent:#4f9cf9; --good:#37b86b; --bad:#e0564a;
    --warn:#e0a93f; --idle:#2a2f38; --idle-line:#3a414c;
    /* darker fill companions for map polygons using the semantic colors above */
    --accent-fill:#33414f; --good-fill:#1f7a47; --bad-fill:#7a2a24; --warn-fill:#6b5320;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  #app{display:none;flex-direction:column;height:100vh}
  header{padding:10px 16px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
  .back{color:var(--muted);text-decoration:none;font-size:13px;font-weight:550}
  .back:hover{color:var(--ink)}
  .mode-tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:3px}
  .mode-tabs button{background:none;border:0;color:var(--muted);padding:6px 12px;
    border-radius:6px;cursor:pointer;font-size:13px;font-weight:550}
  .mode-tabs button.active{background:var(--accent);color:#fff}
  .spacer{flex:1}
  .stat{font-size:13px;color:var(--muted)}
  .stat b{color:var(--ink)}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:6px 12px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:550}
  .btn:hover{border-color:var(--accent)}
  main{flex:1;position:relative}
  #map{position:absolute;inset:0;background:#0b0d10}
  .leaflet-container{background:#0b0d10}
  .prompt{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:500;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 18px;min-width:260px;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.4)}
  .prompt .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .prompt .target{font-size:20px;font-weight:680;margin-top:2px}
  .prompt .fb{font-size:13px;margin-top:4px;min-height:17px}
  .fb.good{color:var(--good)} .fb.bad{color:var(--bad)}
  .done{position:absolute;inset:0;z-index:600;background:rgba(10,12,15,.92);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center}
  .done h2{margin:0;font-size:26px}
  .done .score{font-size:15px;color:var(--muted)}
  .save-nudge{display:flex;flex-direction:column;align-items:center;gap:8px;
    color:var(--muted);font-size:13px}
  .save-nudge[hidden]{display:none}
  .save-nudge .btn{border-color:var(--accent);color:var(--ink)}
  .saved-note{font-size:13px;color:var(--good)}
  .saved-note[hidden]{display:none}
  .save-error{display:flex;flex-direction:column;align-items:center;gap:8px;
    color:var(--bad);font-size:13px}
  .save-error[hidden]{display:none}
  .save-error .btn{border-color:var(--bad);color:var(--ink)}
  .leaflet-interactive{transition:fill .25s,fill-opacity .25s}
  .answer-tip{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    font-size:12px;padding:2px 6px;border-radius:5px;box-shadow:none}
  .answer-tip::before{display:none}

  /* City selection screen */
  #select{display:none;min-height:100vh;flex-direction:column;padding:56px 20px 64px}
  #select .select-head{max-width:760px;margin:0 auto 28px;width:100%}
  #select .select-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  #select h1{font-size:26px;margin:0 0 6px;font-weight:680;letter-spacing:.2px}
  #select .sub{color:var(--muted);font-size:15px;margin:0}
  .city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:14px;max-width:760px;margin:0 auto;width:100%}
  .city-card{display:flex;flex-direction:column;gap:6px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:18px 18px;
    text-decoration:none;color:var(--ink);transition:border-color .15s,transform .15s}
  .city-card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .city-card .name{font-size:17px;font-weight:650}
  .city-card .desc{font-size:13px;color:var(--muted);line-height:1.4}
  .city-card .go{color:var(--accent);font-size:13px;font-weight:600;margin-top:2px}
  .select-msg{grid-column:1/-1;color:var(--muted);font-size:14px;margin:8px 2px}
</style>
</head>
<body>

<section id="select">
  <div class="select-head">
    <div class="select-bar">
      <div>
        <h1>Neighborhoods Quiz</h1>
        <p class="sub">Pick a city and see how well you really know it.</p>
      </div>
      <div id="selectProfileMount"></div>
    </div>
  </div>
  <div class="city-grid" id="cityGrid"></div>
</section>

<div id="app">
  <header>
    <a class="back" href="?">&larr; All cities</a>
    <h1 id="title">Neighborhoods</h1>
    <div class="mode-tabs" id="modeTabs">
      <button data-mode="find" class="active">Find it</button>
      <button data-mode="name">Name it</button>
      <button data-mode="learn">Learn</button>
    </div>
    <div class="spacer"></div>
    <div class="stat" id="stat"></div>
    <button class="btn" id="restart">Restart</button>
    <div id="profileMount"></div>
  </header>
  <main>
    <div id="map"></div>
    <div class="prompt" id="prompt">
      <div class="label" id="pLabel">Find</div>
      <div class="target" id="pTarget">—</div>
      <div class="fb" id="pFb"></div>
    </div>
    <div class="done" id="done">
      <h2 id="doneTitle">Done</h2>
      <div class="score" id="doneScore"></div>
      <div class="save-nudge" id="saveNudge" hidden>
        <span id="saveNudgeText">Log in to save this score to your profile.</span>
        <button class="btn" id="saveLogin">Log in to save</button>
      </div>
      <div class="saved-note" id="savedNote" hidden>Saved to your profile</div>
      <div class="save-error" id="saveError" hidden>
        <span>Couldn’t save this score — check your connection.</span>
        <button class="btn" id="saveRetry">Retry</button>
      </div>
      <button class="btn" id="doneRestart">Go again</button>
    </div>
  </main>
</div>

<script type="module">
import { start } from "../assets/js/neighborhoods-quiz.js";
start().catch(err => console.error('Neighborhoods quiz failed to start', err));
</script>
</body>
</html>
